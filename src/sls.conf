srt {
    ########################################################################
    # GLOBAL SRT SERVER SETTINGS
    ########################################################################

    worker_threads 1;                  # Worker threads for handling SRT connections
                                       # Increase if handling many streams (>5 simultaneous)

    worker_connections 300;            # Max concurrent SRT connections per worker

    http_port 8181;                    # Stats API: http://<host>:8181/stats
    cors_header *;                     # Allow all origins (set specific domain for security)

    log_file logs/srt_server.log;      # Log file (change path if running as a service)
    log_level info;                    # trace | debug | info | warn | error
    
    ########################################################################
    # ADVANCED LOGGING CONFIGURATION (New in redesigned logging system)
    ########################################################################
    # These settings help reduce log noise in IRL streaming scenarios where
    # players/OBS constantly reconnect.
    
    # Rate Limiting (reduces repetitive connection logs)
    log_rate_limit_enabled 1;          # Enable rate limiting (1=on, 0=off, default: 1)
    log_rate_limit_window 60;          # Time window in seconds (default: 60)
    log_rate_limit_threshold 5;        # Log every Nth event (default: 5)
                                       # Example: Player reconnecting every 5s will log every 25s
    
    # Summary Logging (periodic operational overview)
    log_summary_enabled 1;             # Enable summary logs (1=on, 0=off, default: 1)
    log_summary_interval 60;           # Summary interval in seconds (default: 60)
                                       # Logs: active publishers/players, connects, errors
    
    # Session Tracking (correlate logs for same connection)
    log_session_ids 1;                 # Enable session IDs (1=on, 0=off, default: 1)
                                       # Format: [connection:a3f2] for easy grep/filtering
    
    # Log Format
    #log_format text;                   # Log format: text (default) or json
                                       # JSON format useful for log aggregation systems
    
    # Category-Specific Log Levels (override global log_level per subsystem)
    # Categories: connection, listener, stream, data, relay, http, auth, system
    # 
    # Example for production: show only errors for noisy subsystems
    #log_level_connection warn;         # Player/publisher connect/disconnect
    #log_level_listener debug;          # Listener lifecycle, accepts
    #log_level_stream info;             # Stream lifecycle (publishers)
    #log_level_data trace;              # Data flow, packets (very verbose!)
    #log_level_relay debug;             # Puller/pusher operations
    #log_level_http debug;              # HTTP API, webhooks
    #log_level_auth info;               # Authentication, player keys
    #log_level_system info;             # Startup, shutdown, configuration
    #
    # Benefits:
    # - Normal operations at INFO level: ~100 lines/min (90% reduction from ~1000)
    # - Errors/warnings immediately visible
    # - Set specific categories to DEBUG when troubleshooting
    # - OBS reconnecting every 5s generates <1 log line/min at INFO
    ########################################################################

    pidfile /tmp/sls/sls_server.pid;   # PID file (auto-created/deleted on start/stop)

    # API keys for accessing /stats without requiring ?publisher= param
    # Pass in HTTP header: Authorization: <key>
    #api_keys key1,another-secure-key,key3;

    # Auto-post stats to an external service
    #stat_post_url http://127.0.0.1:8001/sls/stat;
    stat_post_interval 1;              # Interval (seconds) for posting stats if enabled

    # Drop privileges after binding. Only applies when sls is started as root;
    # ignored (with a warning) otherwise. If 'group' is omitted, the user's
    # primary group is used.
    #user  nobody;
    #group nogroup;

    ########################################################################
    # 1 MOBILE / IRL / HYBRID SERVER (Supports both SRTLA and direct SRT)
    # All streams are accessible from the same player port
    ########################################################################
    server {
        # Player port(s) - all streams playable here regardless of how they were published
        listen_player 4000;           # Players connect here: srt://<host>:4000?streamid=play/live/<stream>
                                      # Multiple ports are allowed: a comma list and/or inclusive
                                      # ranges, e.g. listen_player 4000,4010,5000-5005;
                                      # One listener is created per port; a player may connect on any of them.

        # Publisher ports - use the appropriate one based on connection type.
        # These accept the same comma/range syntax as listen_player.
        listen_publisher 4001;        # Direct SRT publishers (OBS, FFmpeg without SRTLA)
        listen_publisher_srtla 4002;  # SRTLA publishers (via srtla_rec, bonded cellular)

        # SRTLA patches are automatically enabled on listen_publisher_srtla port
        # and disabled on listen_publisher port. No manual configuration needed.

        latency_min 200;               # Minimum SRT latency (ms). Floor for both publisher and player listeners.
        latency_max 5000;              # Maximum latency for all connections (ms) - prevents excessive delays

        domain_player play;             # Playback domain (used in stats & HLS path)
        domain_publisher publish;       # Publishing domain
        default_sid publish/live/feed1; # Default StreamID if encoder omits one

        backlog 100;                    # Max simultaneous connection attempts
        idle_streams_timeout 30;        # Close idle streams after 30s (-1 = unlimited)

        # SRTO_PEERIDLETIMEO (ms) applied to every accepted socket. Bounds how
        # long a peer may go fully silent (no data, no keepalive) before the
        # link is declared broken. 0 (default) leaves the SRT build's default,
        # which the belabox fork raises so bonded-cellular gaps don't kill a
        # healthy publisher. A reconnecting encoder is handled by publisher
        # takeover regardless of this value. Set a tighter bound (e.g. 4000)
        # only when publishers reach SLS over a stable hop (a local srtla_rec
        # terminating the bond), so a publisher that dies without reconnecting
        # is reaped before idle_streams_timeout. Avoid on direct bonded-SRTLA
        # listeners, where it reduces tolerance for total-bond outages.
        #peer_idle_timeout 4000;

        # First-data probation (ms) for an accepted publisher. A connection that
        # completes the handshake, registers as a publisher, then never sends a
        # media packet (almost always a player/preview pointed at the ingest
        # port; a valid stream key still authenticates) is reaped at
        # (negotiated latency + this grace) instead of squatting the key for the
        # full idle_streams_timeout. The latency term is required: SRT's TSBPD
        # holds the first packet for the whole receive-latency window, so a
        # legitimate high-latency encoder (Moblin ~3000, Belabox 2000-3000)
        # delivers its first byte only after that window. 0 (default) applies a
        # built-in 3000ms grace; -1 disables. Pairs with publisher takeover,
        # which will not evict an incumbent that is actively delivering.
        #publisher_first_data_grace 3000;

        # Listener-wide SRT encryption. When set, libsrt enforces the passphrase
        # during the crypto handshake on every accepted connection (publishers
        # and players alike). This is orthogonal to player_key_auth_url, which
        # runs after the handshake on streamid lookup.
        #   srt_passphrase: 10-79 bytes (empty / unset = no encryption)
        #   srt_pbkeylen:   0/16/24/32 (0 = libsrt default, AES-128)
        #srt_passphrase your-secret-min-10-chars;
        #srt_pbkeylen   16;

        # Webhook for events (optional)
        #on_event_url http://127.0.0.1:8000/sls/on_event;
        # Callback format:
        #   ?method=on_connect|on_close&role_name=&srt_url=<stream_url>

        # Negative auth cache (optional). A publisher streamid whose on_event_url
        # lookup returns non-200 is remembered for this many seconds; repeat
        # attempts with the same key are rejected at the SRT handshake (no accept,
        # no webhook), which blunts a streamid-rotating DoS. 0 uses the 30s default.
        #auth_reject_cache_ttl 30;

        # Player key authentication (optional)
        # When enabled, player connections using the configured domain_player/app_player format
        # will have the stream name validated as a player key against the API endpoint
        # The API endpoint should return the actual stream ID that the player key maps to
        #player_key_auth_url http://127.0.0.1:8000/sls/validate_player_key;
        #player_key_auth_timeout 2000;         # HTTP timeout in milliseconds (default: 2000ms)
        #player_key_cache_duration 60000;      # Cache duration in milliseconds (default: 60000ms)
        #
        # Security features:
        #player_key_rate_limit_requests -1;    # Max requests per IP per window (-1=unlimited, default: -1)
        #player_key_rate_limit_window 60000;   # Rate limit window in milliseconds (default: 60000ms)
        #player_key_min_length 8;              # Minimum player key length (default: 8)
        #player_key_max_length 64;             # Maximum player key length (default: 64)
        # Valid characters: Most printable ASCII characters (space to tilde, hex 20-7E)
        #
        # API call format:
        #   GET <player_key_auth_url>?player_key=<key>
        # Expected response format (JSON only):
        #   {"stream_id": "publish/live/actualstream", "max_players_per_stream": 10}
        # The field "max_players_per_stream" is optional. If present, it overrides the app-level
        # player limit for connections authenticated with this key (-1 = unlimited).
        # 
        # Example usage with this configuration (domain_player=play, app_player=live):
        #   Player connects: srt://host:port?streamid=play/live/abc123
        #   API validates "abc123" and returns: {"stream_id": "publish/live/mystream", "max_players_per_stream": 10}
        #   Player gets connected to the actual "mystream"
        #   Subsequent connections with same key use cached result for better performance
        #   Failed validations are cached briefly to prevent API abuse

        app {
            app_player live;            # Player app name: srt://<host>:30001?streamid=play/live/<stream>
            app_publisher live;         # Publisher app name: srt://<host>:30000?streamid=publish/live/<stream>

            # Security: Control who can publish or play
            #deny publish 123.123.123.123; # Block specific IPs from publishing
            allow publish all;             # Allow all publishers

            #deny play 123.123.123.123;     # Block specific IPs from playback
            allow play all;                # Allow all players

            # Audio gap filling: inserts silent AAC frames when audio PTS gaps
            # are detected, preventing OBS audio breaking during packet loss
            audio_gap_fill true;        # true/false (default: false)
        }
    }

    ########################################################################
    # 2 LOW-LATENCY / DIRECT SRT SERVER (LAN / Studio / OBS Direct)
    # Direct SRT only - no SRTLA support (use server 1 if you need both)
    ########################################################################
    server {
        # Separate ports for low-latency streaming
        listen_publisher 30002;        # Low-latency publishers: srt://<host>:30002?streamid=publish/live/<stream>
        listen_player 30003;           # Low-latency players: srt://<host>:30003?streamid=play/live/<stream>

        # Add listen_publisher_srtla here if you need SRTLA support on this server too
        # listen_publisher_srtla 30004;

        latency_min 20;                # Minimum SRT latency (ms). Floor for both publisher and player listeners.
        latency_max 1000;              # Maximum latency for all connections (ms) - low latency server

        domain_player play;
        domain_publisher publish;
        default_sid publish/live/feed1;

        backlog 100;
        idle_streams_timeout 3;

        # Player key authentication (optional)
        # Uses configured domain_player/app_player format for validation
        #player_key_auth_url http://127.0.0.1:8000/sls/validate_player_key;
        #player_key_auth_timeout 1000;         # Lower timeout for low-latency server (1000ms)
        #player_key_cache_duration 30000;      # Shorter cache for low-latency (30000ms)
        #player_key_rate_limit_requests 15;    # Enable rate limiting for low-latency (15 requests)
        #player_key_rate_limit_window 60000;   # Same window duration (60000ms)
        #player_key_min_length 6;              # Shorter min length for low-latency (6)
        #player_key_max_length 32;             # Shorter max length for low-latency (32)

        app {
            app_player live;            # Player app name: srt://<host>:30003?streamid=play/live/<stream>
            app_publisher live;         # Publisher app name: srt://<host>:30002?streamid=publish/live/<stream>

            allow publish all;
            allow play all;
            
            # Limit the number of players per stream (-1 = unlimited, 0+ = max players)
            max_players_per_stream 3;

            # Bitrate limiting for IRL streams
            max_input_bitrate_kbps 20000;              # 20 Mbps limit (matches BELABOX Cloud)
            max_input_bitrate_violation_timeout 30;    # disconnect after 30s sustained violation
            max_input_bitrate_spike_tolerance 120;     # 1.2x tolerance (triggers at 24 Mbps)

            # Per-publisher push destinations from the auth webhook. The
            # publish auth response may include a JSON body
            # { "pushTargets": [{ "url": "srt://..." }, ...] }; for each
            # accepted entry SLS spins up a CSLSPusher caller. URLs are
            # validated again at use time. Egress per stream is bounded by
            # push_destination_max * max_input_bitrate_kbps.
            #
            # Set push_destination_max to 0 (default) to disable the
            # feature regardless of webhook output.
            #push_destination_max 4;
            #push_destination_allow_internal false;   # default: deny RFC1918 / loopback / link-local
            #push_destination_allow_self false;       # default: deny our own bind addresses
            #push_destination_allow_schemes srt;      # default: srt
            #push_destination_max_url_len 1024;       # default: 1024

            # relay {
            #     type pull;
            #     mode loop; # loop; hash;
            #     reconnect_interval 10;
            #     idle_streams_timeout -1; # s -1: unlimited
            #     upstreams 127.0.0.1:9090?streamid=live.sls.com/live 192.168.1.100:8080/?streamid=live.test.com/live;
            # }
            # relay {
            #     type push;
            #     mode all; # all; hash
            #     reconnect_interval 10;
            #     idle_streams_timeout 10; # s -1: unlimited
            #     upstreams srt://10.201.30.10:8080/?streamid=uplive.sls/live/{stream_name};
            # }
        }
    }
}
