# Loopback config for the publisher-reconnect replay regression test
# (tests/e2e/reconnect_replay.sh). Everything binds 127.0.0.1.
#
# Differences from sls-stats.conf, all load-bearing for the scenario:
#   - peer_idle_timeout 3000: a SIGKILLed publisher sends no SRT shutdown, so
#     the server only notices via peer idle. 3s keeps the outage window short.
#   - player_idle_streams_timeout 60: the player must SURVIVE the publisher
#     outage (that survival is the precondition for the stale-reader replay
#     this test guards against). Publishers keep the short shared timeout.
#   - ports/pidfile shifted so this harness can run alongside the other
#     loopback e2e without colliding.
srt {
    worker_threads 1;
    worker_connections 100;
    http_port 8283;
    http_bind_addr 127.0.0.1;
    api_keys reconnect-replay-test-key;
    stat_post_interval 1;
    log_level info;
    pidfile /tmp/sls_reconnect_e2e.pid;

    server {
        listen_player 5500;
        listen_publisher 5501;

        latency_min 200;
        latency_max 5000;
        peer_idle_timeout 3000;

        domain_player play;
        domain_publisher publish;
        default_sid publish/live/feed1;

        backlog 100;
        idle_streams_timeout 10;
        player_idle_streams_timeout 60;

        app {
            app_player live;
            app_publisher live;
            allow publish all;
            allow play all;
        }
    }
}
