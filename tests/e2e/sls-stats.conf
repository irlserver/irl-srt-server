# Loopback config for the HTTP /stats + control API golden-shape snapshot
# (tests/e2e/stats_snapshot.sh, todo 37). Everything binds 127.0.0.1.
#
# Differences from sls-loopback.conf, all required to exercise the stats API:
#   - api_keys: /stats and /disconnect require a valid Authorization header on
#     every access (see srt-live-server.cpp). This is a loopback-only test
#     credential, never a production secret.
#   - http_port / ports are shifted off the defaults so this harness can run
#     alongside the other loopback e2e without colliding.
srt {
    worker_threads 1;
    worker_connections 100;
    http_port 8282;
    http_bind_addr 127.0.0.1;
    api_keys stats-shape-test-key;
    stat_post_interval 1;
    log_level info;
    pidfile /tmp/sls_stats_snapshot.pid;

    server {
        listen_player 5400;
        listen_publisher 5401;          # L3 direct: srt_client pushes here

        latency_min 200;
        latency_max 5000;

        domain_player play;
        domain_publisher publish;
        default_sid publish/live/feed1;

        backlog 100;
        idle_streams_timeout 30;

        app {
            app_player live;
            app_publisher live;
            allow publish all;
            allow play all;
        }
    }
}
