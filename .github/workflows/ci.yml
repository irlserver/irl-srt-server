name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build-and-test:
    name: ${{ matrix.config }}
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - config: debug
            cmake_flags: ""
          - config: asan-ubsan
            cmake_flags: "-DSLS_SANITIZE=ON"
          - config: tsan
            cmake_flags: "-DSLS_TSAN=ON"

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake tcl pkg-config \
            libssl-dev zlib1g-dev

      # Mirror the Dockerfile: SRT must be the irlserver belabox fork, not
      # the stock libsrt package. Cached by the exact HEAD commit of the
      # belabox branch so the cache invalidates whenever upstream advances.
      - name: Resolve SRT belabox HEAD commit
        id: srt-head
        run: |
          SHA=$(git ls-remote https://github.com/irlserver/srt.git refs/heads/belabox | cut -f1)
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"

      - name: Cache SRT belabox build
        id: cache-srt
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: /usr/local/srt-belabox
          key: srt-belabox-${{ runner.os }}-${{ steps.srt-head.outputs.sha }}

      - name: Build SRT belabox fork
        if: steps.cache-srt.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch belabox https://github.com/irlserver/srt.git /tmp/srt
          cd /tmp/srt
          ./configure --prefix=/usr/local/srt-belabox
          make -j$(nproc)
          sudo make install

      - name: Expose SRT to the build
        run: |
          echo "CPATH=/usr/local/srt-belabox/include" >> $GITHUB_ENV
          echo "LIBRARY_PATH=/usr/local/srt-belabox/lib" >> $GITHUB_ENV
          echo "LD_LIBRARY_PATH=/usr/local/srt-belabox/lib" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=/usr/local/srt-belabox/lib/pkgconfig" >> $GITHUB_ENV

      - name: Cache vendored libs
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: lib
          key: vendor-libs-${{ hashFiles('.gitmodules') }}-${{ hashFiles('lib/**/.git') }}

      # CI-only -Werror gate. Scoped to high-signal, already-clean categories
      # (missing return = UB; format-string = CWE-134) rather than a blanket
      # -Werror, because the tree still carries pre-existing -Wall/-Wextra
      # warnings (unused/shadow/missing-field-init). Kept out of CMakeLists so
      # local dev builds are not blocked by them.
      - name: Configure (${{ matrix.config }})
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DSLS_BUILD_TESTS=ON \
            -DCMAKE_CXX_FLAGS="-Werror=return-type -Werror=format-security -Werror=nonnull -Werror=address -Werror=sizeof-pointer-memaccess" \
            ${{ matrix.cmake_flags }}

      - name: Build
        run: cmake --build build -j

      - name: Test
        run: ctest --test-dir build --output-on-failure

  # Baselined clang-tidy gate. The tree carries pre-existing findings (438 unique
  # on the b968e99 baseline; see .omo/evidence/task-3-srt-quality-hardening.log),
  # so a blanket gate would wedge every PR. Instead we run a full informational
  # pass (the baseline, non-blocking) AND a clang-tidy-diff gate that fails ONLY
  # on NEW findings introduced on lines changed since the merge-base — decision
  # D4 (no blanket -Werror flip). The .clang-tidy check list is the single source
  # of truth and is NOT expanded here.
  clang-tidy:
    name: clang-tidy (static analysis)
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive
          fetch-depth: 0 # full history so the diff gate can find the merge-base

      - name: Install build + clang tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake tcl pkg-config \
            libssl-dev zlib1g-dev \
            clang clang-tidy curl
          # Version-matched run-clang-tidy / clang-tidy-diff helpers (single-file
          # Python scripts, no extra deps) pulled from the matching LLVM release
          # so the local and CI invocations stay identical in form.
          TIDY_MAJOR=$(clang-tidy --version | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1 | cut -d. -f1)
          echo "clang-tidy major version: $TIDY_MAJOR"
          for f in run-clang-tidy clang-tidy-diff; do
            sudo curl -fsSL -o /usr/local/bin/$f.py \
              "https://raw.githubusercontent.com/llvm/llvm-project/release/${TIDY_MAJOR}.x/clang-tools-extra/clang-tidy/tool/$f.py"
            sudo chmod +x /usr/local/bin/$f.py
          done

      # SRT headers (same belabox fork as build-and-test) so every translation
      # unit's #include <srt/srt.h> resolves during analysis.
      - name: Resolve SRT belabox HEAD commit
        id: srt-head
        run: |
          SHA=$(git ls-remote https://github.com/irlserver/srt.git refs/heads/belabox | cut -f1)
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"

      - name: Cache SRT belabox build
        id: cache-srt
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: /usr/local/srt-belabox
          key: srt-belabox-${{ runner.os }}-${{ steps.srt-head.outputs.sha }}

      - name: Build SRT belabox fork
        if: steps.cache-srt.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch belabox https://github.com/irlserver/srt.git /tmp/srt
          cd /tmp/srt
          ./configure --prefix=/usr/local/srt-belabox
          make -j$(nproc)
          sudo make install

      - name: Expose SRT to the build
        run: |
          echo "CPATH=/usr/local/srt-belabox/include" >> $GITHUB_ENV
          echo "LIBRARY_PATH=/usr/local/srt-belabox/lib" >> $GITHUB_ENV
          echo "LD_LIBRARY_PATH=/usr/local/srt-belabox/lib" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=/usr/local/srt-belabox/lib/pkgconfig" >> $GITHUB_ENV

      - name: Cache vendored libs
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: lib
          key: vendor-libs-${{ hashFiles('.gitmodules') }}-${{ hashFiles('lib/**/.git') }}

      # Generate compile_commands.json with clang++ so the database carries
      # clang-parseable flags (no GCC-only -fcompare-debug-second, which would
      # otherwise surface as spurious clang-diagnostic-error). configure alone
      # emits the database — no compile/link required for analysis.
      - name: Configure (compile DB, clang)
        run: |
          cmake -S . -B build-tidy \
            -DCMAKE_BUILD_TYPE=Debug \
            -DSLS_BUILD_TESTS=ON \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
          test -f build-tidy/compile_commands.json

      # Informational full run over src/core/*.cpp + src/*.cpp — the existing
      # findings baseline, mirroring the local evidence run. Non-blocking.
      - name: clang-tidy (full, informational baseline)
        run: |
          python3 /usr/local/bin/run-clang-tidy.py -p build-tidy -quiet \
            'src/core/.*\.cpp' 'src/srt-live-.*\.cpp' \
            2>&1 | tee clang-tidy-full.log || true

      - name: Upload clang-tidy baseline log
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: clang-tidy-full-log
          path: clang-tidy-full.log
          if-no-files-found: ignore

      # Gate: fail ONLY on NEW findings on lines changed since the merge-base.
      # On a push to the default branch (merge-base == HEAD) the diff is empty
      # and the gate is a no-op; it bites on feature branches / PRs.
      - name: clang-tidy diff gate (new findings only)
        run: |
          BASE_REF="${{ github.base_ref }}"
          if [ -z "$BASE_REF" ]; then BASE_REF="${{ github.event.repository.default_branch }}"; fi
          git fetch --no-tags origin "$BASE_REF" || true
          MERGE_BASE=$(git merge-base "origin/$BASE_REF" HEAD 2>/dev/null || true)
          if [ -z "$MERGE_BASE" ] || [ "$MERGE_BASE" = "$(git rev-parse HEAD)" ]; then
            echo "No base diff (merge-base unresolved or == HEAD); nothing new to gate."
            exit 0
          fi
          echo "Gating NEW clang-tidy findings on $MERGE_BASE..HEAD (base: $BASE_REF)"
          git diff -U0 "$MERGE_BASE" HEAD -- src/core src/srt-live-server.cpp src/srt-live-client.cpp \
            | python3 /usr/local/bin/clang-tidy-diff.py \
                -p1 -path build-tidy -clang-tidy-binary clang-tidy -quiet \
            2>&1 | tee clang-tidy-diff.log
          if grep -qE ': (warning|error):' clang-tidy-diff.log; then
            echo "::error::clang-tidy reported NEW findings on changed lines (see clang-tidy-diff.log)."
            exit 1
          fi
          echo "No new clang-tidy findings on changed lines."

  # Style gate, scoped to changed lines. The tree predates the formatter, so a
  # repo-wide `clang-format --dry-run --Werror` would be all noise; instead
  # `git clang-format --diff <merge-base>` checks only the lines this branch
  # touched. Restricted to src/ so vendored lib/ is never reformatted.
  clang-format:
    name: clang-format (style)
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0 # full history so the diff can find the merge-base

      - name: Install clang-format
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format git
          # Ubuntu ships the helper as git-clang-format-<ver>; expose the plain
          # name so `git clang-format` resolves it.
          if ! command -v git-clang-format >/dev/null; then
            GCF=$(ls /usr/bin/git-clang-format* 2>/dev/null | head -1)
            [ -n "$GCF" ] && sudo ln -sf "$GCF" /usr/local/bin/git-clang-format
          fi
          git clang-format -h >/dev/null 2>&1 && echo "git clang-format available"

      - name: clang-format check (changed lines in src/)
        run: |
          BASE_REF="${{ github.base_ref }}"
          if [ -z "$BASE_REF" ]; then BASE_REF="${{ github.event.repository.default_branch }}"; fi
          git fetch --no-tags origin "$BASE_REF" || true
          MERGE_BASE=$(git merge-base "origin/$BASE_REF" HEAD 2>/dev/null || true)
          if [ -z "$MERGE_BASE" ] || [ "$MERGE_BASE" = "$(git rev-parse HEAD)" ]; then
            echo "No base diff (merge-base unresolved or == HEAD); nothing to check."
            exit 0
          fi
          echo "Checking clang-format on src/ lines changed since $MERGE_BASE (base: $BASE_REF)"
          DIFF=$(git clang-format --binary clang-format --diff "$MERGE_BASE" -- src/ 2>/dev/null || true)
          if [ -z "$DIFF" ] \
            || [ "$DIFF" = "no modified files to format" ] \
            || [ "$DIFF" = "clang-format did not modify any files" ]; then
            echo "clang-format: changed lines in src/ are correctly formatted."
            exit 0
          fi
          echo "$DIFF"
          echo "::error::clang-format would reformat changed lines in src/. Locally run: git clang-format $MERGE_BASE -- src/"
          exit 1

  # Time-boxed libFuzzer smoke run. Builds the clang-only SLS_FUZZ flavor against the
  # SAME libsrt as the Dockerfile (irlserver/srt belabox, pinned by commit) and runs
  # each of the three network-boundary fuzz targets for a FIXED 60s budget against the
  # committed seed corpus, failing on any crash. This is a SMOKE run, not a campaign:
  # 3 x 60s = 3 minutes of fuzzing keeps it minutes, not hours, so it is never a long
  # pole on a PR. Any crash-* / oom-* / timeout-* / leak-* unit libFuzzer persists is
  # uploaded as an artifact so a failing run is reproducible from the bytes.
  fuzz:
    name: fuzz (libFuzzer smoke)
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    env:
      # Keep this in lockstep with the Dockerfile's ARG SRT_COMMIT: the fuzz build must
      # link the SAME libsrt the production image uses, so a crash found here reproduces
      # against the shipping parser byte-for-byte.
      SRT_COMMIT: f2297192ce9ab572464e84228efbc46f8c1eabf4
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive

      - name: Install build + clang/libFuzzer tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake tcl pkg-config \
            libssl-dev zlib1g-dev \
            clang
          clang --version

      # libsrt: irlserver/srt belabox, pinned by commit and built exactly as the
      # Dockerfile does (./configure && make && make install). Cached by the pinned
      # commit so it only rebuilds when SRT_COMMIT changes.
      - name: Cache SRT belabox build
        id: cache-srt
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: /usr/local/srt-belabox
          key: srt-belabox-${{ runner.os }}-${{ env.SRT_COMMIT }}

      - name: Build SRT belabox fork
        if: steps.cache-srt.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/irlserver/srt.git /tmp/srt
          cd /tmp/srt
          git checkout ${SRT_COMMIT}
          ./configure --prefix=/usr/local/srt-belabox
          make -j$(nproc)
          sudo make install

      - name: Expose SRT to the build
        run: |
          echo "CPATH=/usr/local/srt-belabox/include" >> $GITHUB_ENV
          echo "LIBRARY_PATH=/usr/local/srt-belabox/lib" >> $GITHUB_ENV
          echo "LD_LIBRARY_PATH=/usr/local/srt-belabox/lib" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=/usr/local/srt-belabox/lib/pkgconfig" >> $GITHUB_ENV

      - name: Cache vendored libs
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: lib
          key: vendor-libs-${{ hashFiles('.gitmodules') }}-${{ hashFiles('lib/**/.git') }}

      # Dedicated clang-only fuzz flavor: SLS_FUZZ instruments the whole tree with
      # fuzzer-no-link/ASan/UBSan and links the libFuzzer driver into each target. It is
      # mutually exclusive with SLS_SANITIZE/SLS_TSAN and requires clang (CMake enforces
      # both), so it lives in its own job/build dir.
      - name: Configure (SLS_FUZZ, clang)
        run: |
          cmake -S . -B build-fuzz \
            -DCMAKE_BUILD_TYPE=Release \
            -DSLS_FUZZ=ON \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++

      - name: Build fuzz targets
        run: cmake --build build-fuzz --target fuzz_ts_parser fuzz_streamid fuzz_conf -j

      # Run EACH target for a fixed 60s against the committed seed corpus. The invocation
      # MIRRORS the local evidence run (.omo/evidence/task-28-srt-quality-hardening.log)
      # exactly: a writable workdir is passed FIRST so the committed corpus stays pristine
      # and is where any crash-* unit lands; -close_fd_mask=1 closes the parser's stdout
      # chatter while libFuzzer / ASan keep stderr; UBSAN_OPTIONS suppressions only silence
      # one benign, documented signed-shift finding (does not affect crash detection). A
      # non-zero exit from any target (a crash) fails the job.
      - name: Fuzz smoke (60s per target)
        run: |
          mkdir -p fuzz-findings
          status=0
          for t in ts_parser:ts streamid:streamid conf:conf; do
            target="fuzz_${t%%:*}"
            corpus="tests/fuzz/corpus/${t##*:}"
            work="fuzz-findings/${t%%:*}"
            mkdir -p "$work"
            echo "::group::$target (60s)"
            UBSAN_OPTIONS=suppressions=tests/fuzz/ubsan_suppressions.txt \
              ./build-fuzz/bin/"$target" -max_total_time=60 -close_fd_mask=1 \
              "$work" "$corpus" || { echo "::error::$target crashed"; status=1; }
            echo "::endgroup::"
          done
          if ls fuzz-findings/*/crash-* fuzz-findings/*/oom-* \
                fuzz-findings/*/timeout-* fuzz-findings/*/leak-* >/dev/null 2>&1; then
            echo "::error::libFuzzer persisted crash units (see the fuzz-findings artifact)."
            status=1
          fi
          exit $status

      # Persist any crash / oom / timeout / leak units libFuzzer wrote so a failing run is
      # reproducible from the exact bytes. On a clean run nothing matches and the upload is
      # a no-op (if-no-files-found: ignore).
      - name: Upload fuzz findings
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: fuzz-findings
          path: |
            fuzz-findings/**/crash-*
            fuzz-findings/**/oom-*
            fuzz-findings/**/timeout-*
            fuzz-findings/**/leak-*
          if-no-files-found: ignore

  # Report-only code-coverage measurement. Builds the dedicated SLS_COVERAGE flavor
  # (--coverage / -O0, which CMake refuses to fuse with the sanitizers or a Release
  # build), runs the suite to exercise the instrumented binaries, and renders a gcovr
  # summary uploaded as an artifact. There is NO threshold gate and the suite run is
  # not allowed to fail the job (build-and-test is the canonical test gate), so this
  # job never blocks a merge on a coverage number.
  coverage:
    name: coverage (gcovr, report-only)
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive

      - name: Install build + coverage tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake tcl pkg-config \
            libssl-dev zlib1g-dev gcovr

      # Same libsrt as the build-and-test job: irlserver/srt belabox, cached by
      # the exact HEAD commit of the belabox branch.
      - name: Resolve SRT belabox HEAD commit
        id: srt-head
        run: |
          SHA=$(git ls-remote https://github.com/irlserver/srt.git refs/heads/belabox | cut -f1)
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"

      - name: Cache SRT belabox build
        id: cache-srt
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: /usr/local/srt-belabox
          key: srt-belabox-${{ runner.os }}-${{ steps.srt-head.outputs.sha }}

      - name: Build SRT belabox fork
        if: steps.cache-srt.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch belabox https://github.com/irlserver/srt.git /tmp/srt
          cd /tmp/srt
          ./configure --prefix=/usr/local/srt-belabox
          make -j$(nproc)
          sudo make install

      - name: Expose SRT to the build
        run: |
          echo "CPATH=/usr/local/srt-belabox/include" >> $GITHUB_ENV
          echo "LIBRARY_PATH=/usr/local/srt-belabox/lib" >> $GITHUB_ENV
          echo "LD_LIBRARY_PATH=/usr/local/srt-belabox/lib" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=/usr/local/srt-belabox/lib/pkgconfig" >> $GITHUB_ENV

      - name: Cache vendored libs
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: lib
          key: vendor-libs-${{ hashFiles('.gitmodules') }}-${{ hashFiles('lib/**/.git') }}

      # Dedicated coverage build directory. SLS_COVERAGE adds --coverage
      # (-fprofile-arcs -ftest-coverage) at -O0 and is mutually exclusive with the
      # sanitizers (CMake FATAL_ERRORs if fused), so the coverage flags never reach a
      # Release or sanitizer build.
      - name: Configure (SLS_COVERAGE)
        run: |
          cmake -S . -B build-coverage \
            -DCMAKE_BUILD_TYPE=Debug \
            -DSLS_BUILD_TESTS=ON \
            -DSLS_COVERAGE=ON

      - name: Build
        run: cmake --build build-coverage -j

      # Run the suite only to drive the instrumented binaries so they emit .gcda
      # counters. `|| true` keeps a failing/flaky test from failing this report-only
      # job — the build-and-test matrix is the authoritative test gate.
      - name: Test (exercise instrumented binaries)
        run: ctest --test-dir build-coverage --output-on-failure || true

      # Render the gcovr summary (text to the log + HTML + Cobertura XML artifact),
      # scoped to src/ by excluding vendored lib/ and the tests themselves. `|| true`
      # guarantees a coverage shortfall never fails the job (no threshold gate).
      - name: gcovr report
        run: |
          mkdir -p coverage-report
          gcovr --root . \
            --gcov-ignore-parse-errors=negative_hits.warn_once_per_file \
            --exclude 'lib/' \
            --exclude 'tests/' \
            --print-summary \
            --txt coverage-report/coverage.txt \
            --html-details coverage-report/coverage.html \
            --xml coverage-report/coverage.xml \
            build-coverage || true
          echo "----- coverage summary -----"
          cat coverage-report/coverage.txt || true

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: coverage-report
          path: coverage-report/
          if-no-files-found: ignore

  # Golden-shape snapshot of the HTTP control plane (/stats, /healthz,
  # /disconnect). Builds the server + client, runs a real srt loopback with one
  # publisher + player, and diffs the normalized /stats|/healthz|/disconnect JSON
  # against the committed fixtures so any accidental change to the control-plane
  # API shape fails the job. FEC-free: drives plain srt_client only.
  stats-snapshot:
    name: stats-snapshot (control-plane API shape)
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive

      - name: Install build + harness tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake tcl pkg-config \
            libssl-dev zlib1g-dev \
            ffmpeg jq curl

      - name: Resolve SRT belabox HEAD commit
        id: srt-head
        run: |
          SHA=$(git ls-remote https://github.com/irlserver/srt.git refs/heads/belabox | cut -f1)
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"

      - name: Cache SRT belabox build
        id: cache-srt
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: /usr/local/srt-belabox
          key: srt-belabox-${{ runner.os }}-${{ steps.srt-head.outputs.sha }}

      - name: Build SRT belabox fork
        if: steps.cache-srt.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch belabox https://github.com/irlserver/srt.git /tmp/srt
          cd /tmp/srt
          ./configure --prefix=/usr/local/srt-belabox
          make -j$(nproc)
          sudo make install

      - name: Expose SRT to the build
        run: |
          echo "CPATH=/usr/local/srt-belabox/include" >> $GITHUB_ENV
          echo "LIBRARY_PATH=/usr/local/srt-belabox/lib" >> $GITHUB_ENV
          echo "LD_LIBRARY_PATH=/usr/local/srt-belabox/lib" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=/usr/local/srt-belabox/lib/pkgconfig" >> $GITHUB_ENV

      - name: Cache vendored libs
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: lib
          key: vendor-libs-${{ hashFiles('.gitmodules') }}-${{ hashFiles('lib/**/.git') }}

      - name: Build server + client
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DSLS_BUILD_TESTS=ON
          cmake --build build -j

      - name: Stats-snapshot (verify control-plane API shape)
        run: |
          SRT_SERVER="$PWD/build/bin/srt_server" \
          SRT_CLIENT="$PWD/build/bin/srt_client" \
            bash tests/e2e/stats_snapshot.sh

      - name: Reconnect-replay (viewer survives publisher restart without replay)
        run: |
          SRT_SERVER="$PWD/build/bin/srt_server" \
          SRT_CLIENT="$PWD/build/bin/srt_client" \
            bash tests/e2e/reconnect_replay.sh
